name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Deploy Frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL:      ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

  # ── Job 2: Deploy Backend to AWS Elastic Beanstalk ──────────────────────────
  deploy-backend:
    name: Deploy Backend → AWS EB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install EB CLI
        run: pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Create deployment package
        run: zip -r ../deploy.zip . -x '*.pyc' -x '__pycache__/*' -x '.git/*' -x 'venv/*' -x 'tests/*'

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name hrms-backend \
            --version-label "deploy-${{ github.sha }}" \
            --source-bundle S3Bucket=${{ secrets.AWS_S3_BUCKET }},S3Key=deployments/deploy-${{ github.sha }}.zip

          aws s3 cp ../deploy.zip s3://${{ secrets.AWS_S3_BUCKET }}/deployments/deploy-${{ github.sha }}.zip

          aws elasticbeanstalk update-environment \
            --environment-name hrms-backend-env \
            --version-label "deploy-${{ github.sha }}"
